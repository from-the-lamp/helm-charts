
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
spec:
  refreshInterval: "{{ .Values.externalSecrets.refreshInterval }}"
  secretStoreRef:
    kind: "{{ .Values.externalSecrets.kind }}"
    name: "{{ .Values.externalSecrets.name }}"
  target:
    name: operator-oauth
    creationPolicy: "{{ .Values.externalSecrets.creationPolicy }}"
    template:
      data:
        client_id: "{{`{{ .client_id }}`}}"
        client_secret: "{{`{{ .client_secret }}`}}"
  data:
  - secretKey: client_id
    remoteRef:
      key: "{{ .Values.remoteSecretKeys.clientId }}"
  - secretKey: client_secret
    remoteRef:
      key: "{{ .Values.remoteSecretKeys.clientSecret }}"
