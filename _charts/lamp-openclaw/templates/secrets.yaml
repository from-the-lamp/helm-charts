apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-env
spec:
  refreshInterval: "{{ .Values.externalSecrets.refreshInterval }}"
  secretStoreRef:
    kind: "{{ .Values.externalSecrets.kind }}"
    name: "{{ .Values.externalSecrets.name }}"
  target:
    name: {{ .Chart.Name }}-env
    creationPolicy: "{{ .Values.externalSecrets.creationPolicy }}"
    template:
      data:
        NODE_ENV: production
        OPENCLAW_STATE_DIR: /home/node/.openclaw
        OPENCLAW_WORKSPACE_DIR: /home/node/clawd
        NODE_OPTIONS: "--max-old-space-size=2048"
        OPENCLAW_GATEWAY_TOKEN: "{{`{{ .gateway_token }}`}}"
        OPENCLAW_GATEWAY_PORT: "8080"
        # OPENAI_API_KEY: "{{`{{ .openai_api_key }}`}}"
        TELEGRAM_BOT_TOKEN: "{{`{{ .telegram_bot_token }}`}}"
        ANTHROPIC_API_KEY: "{{`{{ .anthropic_api_key }}`}}"
        BRAVE_API_KEY: "{{`{{ .brave_api_key }}`}}"
  data:
  - secretKey: gateway_token
    remoteRef:
      key: {{ .Values.remoteSecretKeys.gatewayToken }}
  - secretKey: telegram_bot_token
    remoteRef:
      key: {{ .Values.remoteSecretKeys.telegramBotToken }}
  # - secretKey: openai_api_key
  #   remoteRef:
  #     key: {{ .Values.remoteSecretKeys.openaiApiKey }}
  - secretKey: anthropic_api_key
    remoteRef:
      key: {{ .Values.remoteSecretKeys.anthropicApiKey }}
  - secretKey: brave_api_key
    remoteRef:
      key: {{ .Values.remoteSecretKeys.braveApiKey }}
