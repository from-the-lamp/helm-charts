{{- if .Values.issuers.zerossl.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zerossl-cloudflare
spec:
  refreshInterval: "{{ .Values.externalSecrets.refreshInterval }}"
  secretStoreRef:
    kind: "{{ .Values.externalSecrets.kind }}"
    name: "{{ .Values.externalSecrets.name }}"
  target:
    name: zerossl-cloudflare
    creationPolicy: "{{ .Values.externalSecrets.creationPolicy }}"
    template:
      data:
        zerossl: "{{`{{ .zerossl }}`}}"
        cloudflare: "{{`{{ .cloudflare }}`}}"
  data:
  - secretKey: zerossl
    remoteRef:
      key: "{{ .Values.issuers.zerossl.remoteSecretKeys.zerossl }}"
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: cloudflare
    remoteRef:
      key: "{{ .Values.issuers.zerossl.remoteSecretKeys.cloudflare }}"
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zerossl-cloudflare
spec:
  acme:
    email: devops@infra.cloud
    externalAccountBinding:
      keyID: "{{ .Values.issuers.zerossl.keyID }}"
      keySecretRef:
        name: zerossl-cloudflare
        key: zerossl
    privateKeySecretRef:
      name: cert-manager-zerossl-private-key
    server: https://acme.zerossl.com/v2/DV90
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: zerossl-cloudflare
            key: cloudflare
{{- end }}
