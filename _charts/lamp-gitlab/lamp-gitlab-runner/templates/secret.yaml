apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner
spec:
  refreshInterval: "{{ .Values.externalSecrets.refreshInterval }}"
  secretStoreRef:
    kind: "{{ .Values.externalSecrets.kind }}"
    name: "{{ .Values.externalSecrets.name }}"
  target:
    name: gitlab-runner
    creationPolicy: "{{ .Values.externalSecrets.creationPolicy }}"
    template:
      data:
        runner-token: "{{`{{ .token }}`}}"
        runner-registration-token: "{{`{{ .token }}`}}"
  data:
  - secretKey: token
    remoteRef:
      key: "{{ .Values.remoteSecretKeys.token }}"
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
