{{- if .Values.dashboards.cert_manager.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cert-manager
spec:
  folder: General
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  configMapRef:
    name: dashboard-cert-manager
    key: json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-cert-manager
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  json: >
    {{- .Files.Get "files/cert-manager/cert-manager.json" | nindent 4 }}
{{- end }}
