{{- if .Values.dashboards.google.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: google
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  title: Google
---
{{- if index .Values "dashboards" "google" "cloud-storage-monitoring" }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: google-cloud-storage-monitoring
spec:
  folder: Google
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  configMapRef:
    name: dashboard-google-cloud-storage-monitoring
    key: json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-google-cloud-storage-monitoring
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  json: >
    {{- .Files.Get "files/google/cloud-storage-monitoring.json" | nindent 4 }}
{{- end }}
---
