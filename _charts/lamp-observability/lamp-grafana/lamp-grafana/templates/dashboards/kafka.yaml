{{ if .Values.dashboards.kafka.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: kafka
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  title: Kafka
---
{{- if index .Values "dashboards" "kafka" "strimzi-cruise-control" }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kafka-strimzi-cruise-control
spec:
  folder: Kafka
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  url: "https://raw.githubusercontent.com/strimzi/strimzi-kafka-operator/main/helm-charts/helm3/strimzi-kafka-operator/files/grafana-dashboards/strimzi-cruise-control.json"
{{- end }}
