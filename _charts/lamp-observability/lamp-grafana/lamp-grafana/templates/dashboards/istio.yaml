{{ if .Values.dashboards.istio.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: istio
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  title: Istio
---
{{- if index .Values "dashboards" "istio" "mesh" }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: istio-mesh
spec:
  folder: Istio
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
  grafanaCom:
    id: 7639
    revision: 194
{{- end }}
---
