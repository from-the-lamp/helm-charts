{{- if .Values.dashboards.mongodb.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: mongodb
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  title: MongoDB
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: mongodb-overview
spec:
  folder: MongoDB
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
  configMapRef:
    name: dashboard-mongodb-overview
    key: json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-mongodb-overview
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
data:
  json: >
    {{- .Files.Get "files/mongodb/mongodb-overview.json" | nindent 4 }}
{{- end }}
