global:
  projectId: example-dev
  targetProjectId: example-infra
  
prometheus-operator-crds:
  enabled: true
  crds:
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true

victoria-metrics-k8s-stack:
  enabled: true
  fullnameOverride: "victoria-metrics"
  argocdReleaseOverride: "victoria-metrics"
  defaultRules:
    create: false
  defaultDashboards:
    enabled: false
  grafana:
    enabled: false
  vmsingle:
    enabled: false
  alertmanager:
    enabled: false
  vmalert:
    enabled: false
  coreDns:
    enabled: false
  vmagent:
    spec:
      # remoteWrite:
      #   - url: http://vminsert.infra.example.cloud/insert/0/prometheus/api/v1/write
      # externalLabels:
      #   cluster: dev
      extraArgs:
        promscrape.maxScrapeSize: "33554432" 
      resources:
        limits: {}
        requests:
          cpu: "0.01"
          memory: "500Mi"

  kubelet:
    vmScrape:
      spec:
        metricRelabelConfigs:
          - action: labeldrop
            regex: (uid)
          - action: labeldrop
            regex: (id|name)
          - action: drop
            source_labels: [__name__]
            regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
          - action: replace
            sourceLabels: ['__meta_kubernetes_pod_node_name']
            targetLabel: 'nodename'
          - action: labeldrop
            regex: "beta_kubernetes_io_.*|cloud_google_com_gke_.*|failure_domain_.*|topology_.*|iam_gke_io_.*"

mysql-exporter:
  enabled: false
  fullnameOverride: mysql-exporter
  serviceMonitor:
    enabled: true
  mysql:
    existingConfigSecret:
      name: mysql-exporter-auth
      key: config
  auth: {}
  #   host: 
  #   port: 3306
  #   user: exporter
  #   pass: 
  #   remoteSecretKeys:
  #     host: mysql-host
  #     user: exporter
  #     pass: mysql-password-exporter
  annotations:
    reloader.stakater.com/auto: "true"

postgres-exporter:
  enabled: false
  fullnameOverride: postgres-exporter
  serviceMonitor:
    enabled: true
  config:
    datasourceSecret:
      name: postgres-exporter-auth
      key: dsn
  auth: {}
  #   port: 5432
  #   user: exporter
  #   db: postgres
  #   remoteSecretKeys:
  #     host: postgresql-host
  #     pass: postgresql-password-exporter
  annotations:
    reloader.stakater.com/auto: "true"

mongodb-exporter:
  enabled: false
  fullnameOverride: mongodb-exporter
  existingSecret:
    name: mongodb-exporter-auth
    key: uri
  auth: {}
  #   host:
  #   port: 27017
  #   user: exporter
  #   pass: 
  #   db: admin
  #   remoteSecretKeys:
  #     host:
  #     port: 
  #     user: 
  #     pass: mongodb-password-exporter
  #     db:
  serviceMonitor:
    enabled: true
  annotations:
    reloader.stakater.com/auto: "true"

blackbox-exporter:
  enabled: false
  fullnameOverride: blackbox-exporter
  
externalSecrets:
  kind: ClusterSecretStore
  name: oracle
  refreshInterval: 1h
  creationPolicy: Orphan
