{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "remnawave-panel.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  endpoints:
    - port: http-metrics
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
      basicAuth:
        username:
          name: remnawave-basic-auth
          key: username
        password:
          name: remnawave-basic-auth
          key: password
{{- end }}
