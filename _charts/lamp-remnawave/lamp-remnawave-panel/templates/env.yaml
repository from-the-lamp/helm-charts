apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "remnawave-panel.fullname" . }}-config
data:
  API_INSTANCES: "1"
  APP_PORT: {{ .Values.service.port | quote }}
  METRICS_PORT: {{ .Values.metrics.service.port | quote }}
  REDIS_HOST: remnawave-valkey-primary
  REDIS_PORT: "6379"
  METRICS_USER: {{ .Values.metrics.user }}
  METRICS_PASS: {{ .Values.metrics.pass }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@remnawave-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  POSTGRES_DB: {{ .Values.postgresql.auth.database }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password }}
  {{- end  }}
  {{- if .Values.valkey.enabled }}
  REDIS_HOST: remnawave-valkey-primary
  REDIS_PORT: "6379"
  {{- end }}
{{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
{{- end }}