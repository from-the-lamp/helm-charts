apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnawave-panel.fullname" . }}-metrics
{{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.metrics.service.port }}
      targetPort: {{ .Values.metrics.service.targetPort }}
      protocol: TCP
      name: http-metrics
  selector:
    app: {{ .Release.Name }}
