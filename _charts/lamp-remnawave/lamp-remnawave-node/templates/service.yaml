apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnawave-node.fullname" . }}
  labels:
    {{- include "remnawave-node.labels" . | nindent 4 }}
{{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
  type: {{ .Values.service.type }}
  {{- with .Values.service.ports }}
  ports:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "remnawave-node.selectorLabels" $ | nindent 4 }}
