image:
  name: remnawave/node
  tag: 2.1.6
  pullPolicy: IfNotPresent
  pullSecrets: []

deployment:
  replicas: 1
  annotations: {}

existingSecret: ""
env:
  SSL_CERT: ""

service:
  type: LoadBalancer
  externalTrafficPolicy: Local
  annotations:
    oci.oraclecloud.com/load-balancer-type: "nlb"
    oci-network-load-balancer.oraclecloud.com/security-list-management-mode: "All"
  ports:
    - name: node
      port: 2222
      targetPort: 2222
      protocol: TCP
    - name: xray
      port: 1234
      targetPort: 1234
      protocol: TCP
