{{- if index .Values "analysis" "metrics-success-rate" "enabled" }}
apiVersion: argoproj.io/v1alpha1
kind: ClusterAnalysisTemplate
metadata:
  name: metrics-success-rate
spec:
  args:
    - name: url
  metrics:
    - name: http-ok
      count: 3
      interval: 3s
      successCondition: result == 200
      failureCondition: result != 200
      provider:
        web:
          url: "{{`{{args.url}}`}}"
          method: GET
          timeoutSeconds: 5
{{- end }}
