apiVersion: v1
kind: Secret
metadata:
  name: "argocd-default-cluster"
  labels:
    argocd.argoproj.io/secret-type: cluster
stringData:
  name: "{{ .Values.defaultClusterName }}"
  server: https://kubernetes.default.svc
  config: |-
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
