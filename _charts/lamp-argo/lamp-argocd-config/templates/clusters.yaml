
{{- range .Values.clusters }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "argocd-cluster-{{ .name }}"
spec:
  refreshInterval: "{{ $.Values.externalSecrets.refreshInterval }}"
  secretStoreRef:
    kind: "{{ $.Values.externalSecrets.kind }}"
    name: "{{ $.Values.externalSecrets.name }}"
  target:
    name: "argocd-cluster-{{ .name }}"
    creationPolicy: "{{ $.Values.externalSecrets.creationPolicy }}"
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      data:
        name: {{ .name }}
        server: {{ .server }}
        config: |
          {
            "bearerToken": "{{`{{ .token }}`}}",
            "tlsClientConfig": {
                "insecure": {{ .insecure }},
                "caData": "{{`{{ .cert }}`}}"
            }
          }
  data:
  - secretKey: token
    remoteRef:
      key: {{ .remoteSecretKeys.token }}
      conversionStrategy: Default	
      decodingStrategy: None	
      metadataPolicy: None
  - secretKey: cert
    remoteRef:
      key: {{ .remoteSecretKeys.cert }}
      conversionStrategy: Default	
      decodingStrategy: None	
      metadataPolicy: None
{{- end }}
