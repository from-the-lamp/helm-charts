apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-config
data:
  deployment: |-
    spec:
      template:
        spec:
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  service: |-
    {{- with .Values.service.annotations }}
    metadata:
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.service.spec }}
    spec:
      {{- toYaml . | nindent 6 }}
    {{- end }}
