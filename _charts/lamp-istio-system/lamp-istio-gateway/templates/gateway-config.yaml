apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-config
data:
  deployment: |-
    spec:
      template:
        spec:
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  service: |-
    metadata:
      {{- with .Values.service.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
      healthCheckNodePort: {{ .Values.service.healthCheckNodePort }}